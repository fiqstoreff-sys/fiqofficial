        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 76, 0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 450px;
            width: 85%;
            border-top: 4px solid #ff004c;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff004c;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #ff004c;
            object-fit: cover;
        }

        h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px #ff004c;
        }

        p {
            color: #bbb;
            font-style: italic;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .btn {
            display: block;
            background: rgba(255, 0, 76, 0.1);
            color: white;
            padding: 14px;
            margin: 12px 0;
            text-decoration: none;
            border: 1px solid #ff004c;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #ff004c;
            box-shadow: 0 0 25px #ff004c;
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75em;
            color: #777;
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #ff004c;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }
    </style>
</head>
