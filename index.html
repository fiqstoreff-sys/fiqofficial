<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiqOfficial | Granger Edition</title>
    <style>
        /* CSS UNTUK DESIGN TEMA GRANGER */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); /* Warna gelap deep sea/night */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-left: 5px solid #ff004c; /* Merah Granger */
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff004c;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #ff004c;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 2px 2px #ff004c;
        }

        p {
            color: #ccc;
            font-style: italic;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            background: transparent;
            color: white;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            border: 1px solid #ff004c;
            border-radius: 5px;
            transition: 0.4s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #ff004c;
            box-shadow: 0 0 20px #ff004c;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #666;
        }

        /* Effect hiasan */
        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #ff004c;
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="glow" style="top: 10%; left: 10%;"></div>
    <div class="glow" style="bottom: 10%; right: 10%;"></div>

    <div class="container">
        <!-- Anda boleh tukar link gambar ini kepada gambar Granger pilihan anda -->
        <img src="https://img.ytbh.com/avatar/granger.jpg" alt="Granger" class="profile-img" onerror="this.src='https://via.placeholder.com/150/ff004c/ffffff?text=GRANGER'">
        
        <h1>FIQ OFFICIAL</h1>
        <p>"Experience the harmony of death."</p>

                <a href="#" class="btn">INFO STOK</a>
        <a href="#" class="btn">TIKTOK</a>
        <a href="#" class="btn">FEEDBACK</a>
        <a href="#" class="btn">CONTACT ME</a>
        
    

        

        <div class="footer">
            &copy; 2026 FiqOfficial | Designed with Granger CC Style
        </div>
    </div>
</body>
            </html>
